<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #f0eeff;
      --text-muted: #7a7a9a;
      --user-bubble: #7c6aff;
      --ai-bubble: #1c1c27;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Background effect */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,106,155,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 10;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
      box-shadow: 0 0 20px rgba(124,106,255,0.4);
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4ade80;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }

    .suggestion {
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
      max-width: 780px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .message.ai .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 600px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 28px 24px;
      position: relative;
      z-index: 10;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.1);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-muted); }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #sendBtn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(124,106,255,0.3);
    }

    #sendBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(124,106,255,0.5);
    }

    #sendBtn:active { transform: scale(0.97); }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* File input hidden */
    #fileInput { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">T</div>
  <div class="header-text">
    <h1>AI Assistant</h1>
    <p>Powered by Google Gemini</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Hello! 👋</h2>
    <p>Your intelligent assistant. Ask me anything!</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">✨ What can you do?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">🌍 Tell me something interesting</div>
      <div class="suggestion" onclick="sendSuggestion(this)">💡 Give me a business idea</div>
      <div class="suggestion" onclick="sendSuggestion(this)">📝 Help me write something</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" rows="1" placeholder="Ask me anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div class="input-actions">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">📎</button>
      <button id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*,.pdf,.txt"/>
  <p class="input-hint">TUHIN AI can make mistakes. Use it wisely.</p>
</div>

<script>
  const GEMINI_API_KEY = "AIzaSyBbaiQFXlbeS-l_FhvSdlKo4hzyNQrNwsk"; 
  const chat = document.getElementById("chat");
  const input = document.getElementById("userInput");
  let history = [];

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(el) {
    input.value = el.textContent.replace(/^[^\w]+/, "").trim();
    sendMessage();
  }

  function addMessage(role, text) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const msg = document.createElement("div");
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="avatar">${role === "user" ? "👤" : "🤖"}</div>
      <div class="bubble">${text}</div>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
  }

  function showTyping() {
    const msg = document.createElement("div");
    msg.className = "message ai typing";
    msg.id = "typing";
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    history.push({ role: "user", parts: [{ text }] });
    input.value = "";
    input.style.height = "auto";
    showTyping();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: history })
        }
      );
      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't respond.";
      history.push({ role: "model", parts: [{ text: reply }] });
      removeTyping();
      addMessage("ai", reply.replace(/\n/g, "<br>"));
    } catch (err) {
      removeTyping();
      addMessage("ai", "⚠️ Something went wrong. Please try again.");
    }
  }
</script>
</body>
</html>
